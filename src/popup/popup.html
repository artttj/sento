<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <div class="header">
      <img src="../icons/icon32.png" class="logo" alt="" aria-hidden="true" />
      <span class="brand">Sentō</span>
      <button class="icon-btn" id="btn-settings" title="Open Settings" type="button">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11.4 2.5h-2.8l-.4 1.9a6 6 0 0 0-1.5.9L4.8 4.6 3.4 6l.7 1.9a6 6 0 0 0-.9 1.5L1.3 9.8v2.4l1.9.4c.2.5.5 1 .9 1.5L3.4 16l1.4 1.4 1.9-.7a6 6 0 0 0 1.5.9l.4 1.9h2.8l.4-1.9a6 6 0 0 0 1.5-.9l1.9.7L16.6 16l-.7-1.9c.4-.5.7-1 .9-1.5l1.9-.4V9.8l-1.9-.4a6 6 0 0 0-.9-1.5l.7-1.9L15.2 4.6l-1.9.7a6 6 0 0 0-1.5-.9z"/>
          <circle cx="10" cy="11" r="2.5"/>
        </svg>
      </button>
    </div>

    <div class="divider"></div>

    <div class="site-row">
      <span class="site-name" id="site-name">—</span>
    </div>

    <button class="power-btn" id="btn-toggle" type="button" aria-label="Toggle site">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M18.36 6.64A9 9 0 1 1 5.64 6.64"/>
        <line x1="12" y1="2" x2="12" y2="12"/>
      </svg>
    </button>

    <span class="status-label" id="status-label"></span>

    <div class="divider"></div>

    <div class="footer">
      <span class="footer-hint" id="footer-hint"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
